<div class="h-full bg-linear-to-br from-violet-50 to-purple-100 py-12 px-4 sm:px-6 lg:px-8 overflow-y-auto">
  <div class="max-w-7xl mx-auto">
    <div class="mb-8">
      <h2 class="text-4xl sm:text-5xl font-bold text-gray-900 mb-2">
        🏁 Races
      </h2>
      <p class="text-lg text-gray-600">Select your next race to participate</p>
    </div>

    @if (races().length) {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (race of races(); track race.id) {
          <a 
            [routerLink]="[race.id]"
            class="group block bg-white rounded-lg shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden border border-gray-200 hover:border-violet-300 cursor-pointer"
          >
            <div class="h-48 flex items-center justify-center bg-linear-to-r from-violet-600 to-purple-600 overflow-hidden">
              @if (race.regionImage) {
                <img [src]="race.regionImage" [alt]="race.name" class="w-full h-full object-cover">
              } @else {
                <span class="text-4xl">🐎</span>
              }
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold text-gray-900 group-hover:text-violet-600 transition-colors duration-200">
                {{ race.name }}
              </h3>
            </div>
          </a>
        }
      </div>
    } @else {
      <div class="rounded-lg border-2 border-dashed border-gray-300 bg-white p-12 text-center">
        <span class="text-6xl block mb-4">🏇</span>
        <h3 class="text-2xl font-bold text-gray-700 mb-2">No races available</h3>
        <p class="text-gray-500">Check back later for upcoming races!</p>
      </div>
    }
  </div>
</div>
