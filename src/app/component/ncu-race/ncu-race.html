<div class="h-full bg-linear-to-br from-violet-50 to-purple-100 py-8 px-4 sm:px-6 lg:px-8 overflow-y-auto">
  <div class="max-w-7xl mx-auto">
    @if (race(); as raceData) {
      <div class="mb-12">
        <a href="/races" class="inline-flex items-center text-violet-600 hover:text-violet-700 font-semibold mb-6">
          <span class="mr-2">←</span> Back to Races
        </a>
        <h2 class="text-5xl font-bold text-gray-900 mb-2">
          🏁 {{ raceData.name }}
        </h2>
        <p class="text-lg text-gray-600">Race ID: {{ raceData.id }}</p>
      </div>

      <div class="mb-8">
        <h3 class="text-3xl font-bold text-gray-900 mb-6">🐴 Racing Ponies</h3>
        <div class="flex flex-col gap-6">
          @for (pony of ponies(); track pony.id) {
            <div class="bg-white rounded-lg shadow-md hover:shadow-lg transition-all duration-300 overflow-hidden border border-gray-200">
              <app-ncu-pony [ponyModel]="pony"></app-ncu-pony>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="text-center py-12">
        <span class="text-6xl block mb-4">🔍</span>
        <h2 class="text-3xl font-bold text-gray-700 mb-2">Race Not Found</h2>
        <p class="text-gray-500 mb-6">The race you're looking for doesn't exist.</p>
        <a href="/races" class="px-6 py-3 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-lg inline-block">
          🏁 Back to Races
        </a>
      </div>
    }
  </div>
</div>
